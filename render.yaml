services:
  - type: web
    name: vendor-widget
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: npm install --include=dev && npm run build:widget
    startCommand: npm run start:prod
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: COOKIE_SECRET
        generateValue: true
